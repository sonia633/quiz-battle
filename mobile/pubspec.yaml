name: quiz_battle
description: AI Quiz Battle Platform — Flutter client.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Networking
  dio: ^5.7.0

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # Real-time multiplayer (STOMP over WebSocket — matches the Java quiz-service)
  stomp_dart_client: ^2.0.0

  # Value equality for models
  equatable: ^2.0.5

  # Charts for the dashboard
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
