spring:
  datasource:
    url: jdbc:h2:mem:quizbattle;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

security:
  jwt:
    secret: test-secret-key-that-is-long-enough-to-be-valid-for-hs256-algorithm
    access-ttl-seconds: 900
    refresh-ttl-seconds: 1209600
